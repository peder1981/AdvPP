<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AdvPP Web</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3;
          --accent:#2f81f7; --ok:#3fb950; --warn:#d29922; --err:#f85149; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--fg);
         font:14px/1.5 ui-monospace,'Cascadia Code',Consolas,monospace;
         display:flex; flex-direction:column; height:100vh; }
  header { padding:10px 16px; background:var(--panel);
           border-bottom:1px solid var(--border);
           display:flex; align-items:center; gap:12px; }
  header b { color:var(--accent); font-size:15px; }
  header .st { margin-left:auto; font-size:12px; opacity:.75; }
  #console { flex:1; overflow-y:auto; padding:14px 16px; white-space:pre-wrap; }
  #console .err { color:var(--err); }
  #console .sys { color:var(--warn); opacity:.8; }
  button { font:inherit; padding:6px 18px; border-radius:6px; cursor:pointer;
           border:1px solid var(--border); background:var(--panel); color:var(--fg); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,.6);
             display:none; align-items:center; justify-content:center; }
  #dialog { background:var(--panel); border:1px solid var(--border);
            border-radius:10px; min-width:320px; max-width:520px;
            box-shadow:0 12px 40px rgba(0,0,0,.5); }
  #dialog .title { padding:10px 16px; border-bottom:1px solid var(--border);
                   font-weight:bold; display:flex; gap:8px; align-items:center; }
  #dialog .msg { padding:18px 16px; white-space:pre-wrap; }
  #dialog .btns { padding:12px 16px; display:flex; gap:10px;
                  justify-content:flex-end; border-top:1px solid var(--border); }
  .ico { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .ico.info{background:var(--accent)} .ico.alert{background:var(--warn)}
  .ico.stop{background:var(--err)}  .ico.yesno{background:var(--ok)}
</style>
</head>
<body>
<header>
  <b>AdvPP Web</b><span>fase 1 — console e diálogos</span>
  <span class="st" id="status">conectando…</span>
  <button onclick="location.reload()">&#8635; Executar novamente</button>
</header>
<div id="console"></div>

<div id="overlay">
  <div id="dialog">
    <div class="title"><span class="ico" id="dIco"></span><span id="dTitle"></span></div>
    <div class="msg" id="dMsg"></div>
    <div class="btns" id="dBtns"></div>
  </div>
</div>

<script>
const sid = crypto.randomUUID();
const consoleEl = document.getElementById('console');
const statusEl = document.getElementById('status');

function line(text, cls) {
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = text;
  consoleEl.appendChild(d);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

function showDialog(ev) {
  document.getElementById('dTitle').textContent = ev.title || '';
  document.getElementById('dMsg').textContent = ev.text || '';
  document.getElementById('dIco').className = 'ico ' + ev.kind;
  const btns = document.getElementById('dBtns');
  btns.innerHTML = '';
  const answer = r => {
    document.getElementById('overlay').style.display = 'none';
    fetch('/reply?s=' + sid, { method:'POST',
      body: JSON.stringify({ id: ev.id, result: r }) });
  };
  if (ev.kind === 'yesno') {
    const yes = document.createElement('button');
    yes.className = 'primary'; yes.textContent = 'Sim';
    yes.onclick = () => answer('yes');
    const no = document.createElement('button');
    no.textContent = 'Não'; no.onclick = () => answer('no');
    btns.append(no, yes);
  } else {
    const ok = document.createElement('button');
    ok.className = 'primary'; ok.textContent = 'OK';
    ok.onclick = () => answer('ok');
    btns.append(ok);
  }
  document.getElementById('overlay').style.display = 'flex';
  btns.querySelector('.primary').focus();
}

const es = new EventSource('/events?s=' + sid);
es.onopen = () => statusEl.textContent = 'executando';
es.onerror = () => statusEl.textContent = 'desconectado';
es.onmessage = m => {
  const ev = JSON.parse(m.data);
  if (ev.type === 'output') line(ev.text, ev.text.startsWith('──') ? 'sys' : '');
  else if (ev.type === 'dialog') showDialog(ev);
  else if (ev.type === 'error') { line('ERRO: ' + ev.text, 'err'); statusEl.textContent = 'erro'; }
  else if (ev.type === 'done') { line('── fim da execução ──', 'sys'); statusEl.textContent = 'finalizado'; es.close(); }
};
</script>
</body>
</html>
