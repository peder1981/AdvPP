name: Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.24"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Fyne dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: go vet
        run: go vet ./...
      - name: go test
        # Testes que dependem do modelo Falcon3-1.58bit (~2.2GB, não
        # versionado) ou do binário llama-cli de referência pulam sozinhos
        # via os.Stat — não é preciso -short para eles rodarem em CI.
        run: go test ./...
