name: Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.24"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Fyne dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: go vet
        run: go vet ./...
      - name: go test
        # Testes que dependem do modelo Falcon3-1.58bit (~2.2GB, não
        # versionado) ou do binário llama-cli de referência pulam sozinhos
        # via os.Stat — não é preciso -short para eles rodarem em CI.
        run: go test ./...
      - name: Standalone executable smoke test (Windows)
        # Só builda e RODA (não só "builda") um executável standalone
        # gerado por `advplc build` num runner Windows nativo de verdade —
        # é a única forma real de confirmar que o stub (janela Fyne +
        # console + banco) funciona no alvo em que mais importa: um app
        # GUI-subsystem sem terminal anexado, onde ConOut sem essa janela
        # simplesmente desapareceria.
        if: runner.os == 'Windows'
        shell: bash
        timeout-minutes: 3
        env:
          ADVPP_STUB_TRACE: "1"
        run: |
          go build -o advplc.exe ./cmd/advplc
          ./advplc.exe build tests/standalone_console_test.prw -o standalone_smoke.exe
          # Run detached with our own poll+kill instead of `output=$(...)`:
          # command substitution blocks until the process exits, so a hang
          # would show zero output at all (even from ADVPP_STUB_TRACE) —
          # writing to a file lets us see whatever DID happen even if it
          # never finishes.
          ./standalone_smoke.exe > out.log 2>&1 &
          pid=$!
          for i in $(seq 1 30); do
            kill -0 $pid 2>/dev/null || break
            sleep 1
          done
          if kill -0 $pid 2>/dev/null; then
            echo "process still running after 30s, killing"
            kill -9 $pid 2>/dev/null || true
          fi
          echo "--- out.log ---"
          cat out.log
          echo "---------------"
          grep -q "standalone smoke test: linha 1" out.log
          grep -q "standalone smoke test: linha 2" out.log
